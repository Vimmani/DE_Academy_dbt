macros:
  - name: cents_to_dollars
    description: This macro take column with cents amount and conver it to dollar and round it to 2 decimal by default
    arguments:
      - name: column_name
        type: string
        description: This column provid the cents value to the macro to conver it to dollar
      - name: decimals
        type: string
        description: This indicates to how many decimals the dollar amount should be rounded off by default it is 2
  - name: grant_select
    description: A macro that grants select privis on target.schema and target.role unless otherwise supplied.
    arguments:
      - name: schema
        type: string 
        description: schema we want to grant priv's on, by default is our target schema
      - name: role
        type: string 
        description: role we want to grant priv's on, by default is our target role