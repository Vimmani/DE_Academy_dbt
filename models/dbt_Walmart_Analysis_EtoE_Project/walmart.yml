version: 2

sources:
  - name: walmart_source
    database: WALMART_DB # Optional: override database
    schema: RAW_DATA # Optional: override schema
    tables:
      - name: DEPARTMENT_RAW_DATA
        external:
          location: "@WALMART_DB.RAW_DATA.WALMART_S3_STAGE"
          pattern: '(?i).*department.*\.csv'
          file_format: "(FORMAT_NAME = WALMART_DB.RAW_DATA.MY_CSV_FORMAT)"

      - name: FACT_RAW_DATA
        external:
          location: "@WALMART_DB.RAW_DATA.WALMART_S3_STAGE"
          pattern: '(?i).*fact.*\.csv'
          file_format: "(FORMAT_NAME = WALMART_DB.RAW_DATA.MY_CSV_FORMAT)"

      - name: STORES_RAW_DATA
        external:
          location: "@WALMART_DB.RAW_DATA.WALMART_S3_STAGE"
          pattern: '(?i).*stores.*\.csv'
          file_format: "(FORMAT_NAME = WALMART_DB.RAW_DATA.MY_CSV_FORMAT)"

  - name: walmart_mart_source
    database: WALMART_DB # Optional: override database
    schema: MART_DATA # Optional: override schema
    tables:
        - name: WALMART_FACT_TABLE

models:
  - name: Walmart_store_dim
    columns:
      - name: DATE_ID
        tests:
          - not_null
          - unique
  - name: Walmart_date_dim
    columns:
      - name: DATE_ID
        tests:
          - not_null
          - unique
  - name: Walmart_fact_table
    columns:
      - name: ISHOLIDAY
        tests:
          - not_null
  - name: Walmart_department_dim
    columns:
      - name: DATE
        tests:
          - not_null
          